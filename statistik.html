<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Statistik Pengawas</title>
<link rel="stylesheet" href="style.css">
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>

<header>
<h2>Statistik Pengawas Sesi Petang 2026</h2>
</header>

<div class="cards">
<div class="card">
<h3>Jumlah</h3>
<p id="total"></p>
</div>

<div class="card">
<h3>Lelaki</h3>
<p id="lelaki"></p>
</div>

<div class="card">
<h3>Perempuan</h3>
<p id="perempuan"></p>
</div>

<div class="card">
<h3>% Lelaki</h3>
<p id="percentL"></p>
</div>

<div class="card">
<h3>% Perempuan</h3>
<p id="percentP"></p>
</div>
</div>

<div class="chart-box">
<canvas id="genderChart"></canvas>
</div>

<a href="home.html" class="back-btn">⬅ Kembali</a>

<script src="script.js"></script>
</body>
</html>
