<!DOCTYPE html>
<html lang="ms">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dashboard Unit Disiplin SK Ranggu</title>
<link rel="stylesheet" href="style.css">
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>

<body>

<header>
<h1>DASHBOARD UNIT DISIPLIN</h1>
<p>Enrolmen Pengawas Sesi Petang 2026</p>
<p>Sekolah Kebangsaan Ranggu, Tawau</p>
</header>

<section class="cards">
<div class="card">
<h3>Jumlah Pengawas</h3>
<p id="total">48</p>
</div>

<div class="card">
<h3>Lelaki</h3>
<p id="lelaki">22</p>
</div>

<div class="card">
<h3>Perempuan</h3>
<p id="perempuan">26</p>
</div>
</section>

<section class="chart-section">
<canvas id="genderChart"></canvas>
</section>

<section class="chart-section">
<canvas id="classChart"></canvas>
</section>

<script src="script.js"></script>
</body>
</html>
